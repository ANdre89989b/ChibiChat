<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
/>

<title>ChibiCat AI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    background:#ececec;

    overflow:hidden;
}

/* =========================
APP
========================= */

.app{

    display:flex;

    height:100vh;

    width:100%;
}

/* =========================
SIDEBAR
========================= */

.sidebar{

    width:280px;

    background:#121826;

    color:white;

    display:flex;

    flex-direction:column;

    padding:20px;

    position:fixed;

    left:-300px;

    top:0;

    height:100vh;

    z-index:999;

    transition:.3s;
}

.sidebar.active{

    left:0;
}

.sidebar-header{

    display:flex;

    align-items:center;

    margin-bottom:30px;
}

.sidebar-logo{

    width:60px;
    height:60px;

    border-radius:50%;

    background:#ff4fa3;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:32px;

    margin-right:15px;
}

.sidebar h2{

    font-size:28px;
}

.sidebar p{

    color:#aaa;
}

.new-chat{

    background:linear-gradient(
        90deg,
        #5b7cff,
        #7a5cff
    );

    border:none;

    color:white;

    padding:18px;

    border-radius:18px;

    font-size:20px;

    cursor:pointer;

    margin-bottom:25px;
}

.chat-history{

    flex:1;

    overflow-y:auto;
}

.history-item{

    background:#1d2638;

    padding:18px;

    border-radius:18px;

    margin-bottom:15px;

    cursor:pointer;

    transition:.2s;
}

.history-item:hover{

    background:#293349;
}

/* =========================
OVERLAY
========================= */

.overlay{

    position:fixed;

    width:100%;
    height:100vh;

    background:rgba(0,0,0,.4);

    z-index:998;

    display:none;
}

.overlay.active{

    display:block;
}

/* =========================
MAIN
========================= */

.main{

    display:flex;

    flex-direction:column;

    width:100%;
}

/* =========================
TOPBAR
========================= */

.topbar{

    height:90px;

    background:#ff1493;

    display:flex;

    align-items:center;

    padding:20px;

    color:white;
}

.menu-btn{

    font-size:42px;

    margin-right:20px;

    cursor:pointer;
}

.logo{

    width:60px;
    height:60px;

    border-radius:50%;

    background:#ff69b4;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:35px;

    margin-right:15px;
}

.title h1{

    font-size:28px;
}

.title p{

    font-size:18px;
}

/* =========================
CHAT AREA
========================= */

.chat-area{

    flex:1;

    overflow-y:auto;

    padding:20px;

    background:#ececec;
}

.message{

    max-width:80%;

    padding:16px;

    border-radius:22px;

    margin-bottom:20px;

    font-size:18px;

    line-height:1.6;

    word-wrap:break-word;
}

.bot{

    background:white;

    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.user{

    background:#ff5ca8;

    color:white;

    margin-left:auto;
}

/* =========================
INPUT
========================= */

.input-area{

    display:flex;

    padding:15px;

    gap:10px;

    background:white;

    border-top:1px solid #ddd;
}

input{

    flex:1;

    border:none;

    background:#eceff3;

    border-radius:20px;

    padding:18px;

    font-size:18px;

    outline:none;
}

button.send{

    border:none;

    background:#ff4fa3;

    color:white;

    padding:0 30px;

    border-radius:20px;

    font-size:20px;

    cursor:pointer;
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

    .sidebar{

        width:85%;
    }

    .title h1{

        font-size:24px;
    }

    .message{

        max-width:90%;

        font-size:17px;
    }

    input{

        font-size:16px;
    }

    button.send{

        font-size:18px;

        padding:0 20px;
    }
}

</style>

</head>

<body>

<div
    class="overlay"
    id="overlay"
    onclick="closeSidebar()"
></div>

<div class="app">

    <!-- SIDEBAR -->

    <div
        class="sidebar"
        id="sidebar"
    >

        <div class="sidebar-header">

            <div class="sidebar-logo">

                🐱

            </div>

            <div>

                <h2>ChibiCat</h2>

                <p>Your cozy AI companion</p>

            </div>

        </div>

        <button
            class="new-chat"
            onclick="createNewChat()"
        >

            + New Chat

        </button>

        <div
            class="chat-history"
            id="chatHistory"
        ></div>

    </div>

    <!-- MAIN -->

    <div class="main">

        <!-- TOPBAR -->

        <div class="topbar">

            <div
                class="menu-btn"
                onclick="openSidebar()"
            >

                ☰

            </div>

            <div class="logo">

                🐱

            </div>

            <div class="title">

                <h1>ChibiCat AI</h1>

                <p>● Online</p>

            </div>

        </div>

        <!-- CHAT -->

        <div
            class="chat-area"
            id="chatArea"
        >

            <div class="message bot">

                Halo teman! 😊💕

            </div>

        </div>

        <!-- INPUT -->

        <div class="input-area">

            <input
                type="text"
                id="messageInput"
                placeholder="Ketik pesan..."
            />

            <button
                class="send"
                onclick="sendMessage()"
            >

                Kirim

            </button>

        </div>

    </div>

</div>

<script>

let currentChatId = null

// =========================
// SIDEBAR
// =========================

function openSidebar(){

    document
        .getElementById("sidebar")
        .classList.add("active")

    document
        .getElementById("overlay")
        .classList.add("active")
}

function closeSidebar(){

    document
        .getElementById("sidebar")
        .classList.remove("active")

    document
        .getElementById("overlay")
        .classList.remove("active")
}

// =========================
// NEW CHAT
// =========================

async function createNewChat(){

    const response =
        await fetch("/new_chat",{

            method:"POST"
        })

    const data =
        await response.json()

    currentChatId =
        data.chat_id

    document
        .getElementById("chatArea")
        .innerHTML = `
            <div class="message bot">
                Halo teman! 😊💕
            </div>
        `

    loadChats()

    closeSidebar()
}

// =========================
// LOAD CHAT LIST
// =========================

async function loadChats(){

    const response =
        await fetch("/get_chats")

    const chats =
        await response.json()

    const history =
        document.getElementById(
            "chatHistory"
        )

    history.innerHTML = ""

    chats.forEach(chat=>{

        history.innerHTML += `

            <div
                class="history-item"
                onclick="loadChat('${chat.chat_id}')"
            >

                ${chat.title}

            </div>
        `
    })
}

// =========================
// LOAD CHAT
// =========================

async function loadChat(chatId){

    currentChatId = chatId

    const response =
        await fetch(
            `/load_chat/${chatId}`
        )

    const messages =
        await response.json()

    const chatArea =
        document.getElementById(
            "chatArea"
        )

    chatArea.innerHTML = ""

    messages.forEach(msg=>{

        const role =
            msg.role === "user"
            ? "user"
            : "bot"

        chatArea.innerHTML += `

            <div class="message ${role}">

                ${msg.content}

            </div>
        `
    })

    closeSidebar()
}

// =========================
// SEND MESSAGE
// =========================

async function sendMessage(){

    const input =
        document.getElementById(
            "messageInput"
        )

    const message =
        input.value.trim()

    if(message === "") return

    const chatArea =
        document.getElementById(
            "chatArea"
        )

    // USER MESSAGE

    chatArea.innerHTML += `

        <div class="message user">

            ${message}

        </div>
    `

    input.value = ""

    chatArea.scrollTop =
        chatArea.scrollHeight

    try{

        const response =
            await fetch("/chat",{

                method:"POST",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body:JSON.stringify({

                    message:message
                })
            })

        const data =
            await response.json()

        chatArea.innerHTML += `

            <div class="message bot">

                ${data.reply}

            </div>
        `

        chatArea.scrollTop =
            chatArea.scrollHeight

        loadChats()

    }catch(error){

        chatArea.innerHTML += `

            <div class="message bot">

                Error server 😭

            </div>
        `
    }
}

// =========================
// ENTER KEY
// =========================

document
.getElementById("messageInput")
.addEventListener(

    "keypress",

    function(e){

        if(e.key === "Enter"){

            sendMessage()
        }
    }
)

// =========================
// INIT
// =========================

loadChats()

</script>

</body>
</html>
